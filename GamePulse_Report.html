        {name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256"},
        keyMaterial, {name: "AES-GCM", length: 256}, false, ["decrypt"]
    );
}

async function decrypt() {
    const pwd = document.getElementById("pwd");
    const lockScreen = document.getElementById("lockScreen");
    const decrypting = document.getElementById("decrypting");

    pwd.classList.remove("error");
    decrypting.style.display = "block";

    try {
        const data = JSON.parse(atob(ENCRYPTED));
        const salt = base64ToBuffer(data.salt);
        const iv = base64ToBuffer(data.iv);
        const ciphertext = base64ToBuffer(data.ct);
        const tag = base64ToBuffer(data.tag);

        const key = await deriveKey(pwd.value, salt);
        const combined = new Uint8Array(ciphertext.length + tag.length);
        combined.set(ciphertext);
        combined.set(tag, ciphertext.length);

        const decrypted = await crypto.subtle.decrypt(
            {name: "AES-GCM", iv: iv},
            key, combined
        );

        document.open();
        document.write(new TextDecoder().decode(decrypted));
        document.close();
    } catch (e) {
        pwd.classList.add("error");
        pwd.value = "";
        decrypting.style.display = "none";
    }
}

function base64ToBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

document.getElementById("pwd").addEventListener("keypress", function(e) {
    if (e.key === "Enter") decrypt();
});
</script>

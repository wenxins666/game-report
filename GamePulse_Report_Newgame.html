async function deriveKey(password,salt){
    const keyMaterial=await crypto.subtle.importKey(
        "raw",new TextEncoder().encode(password),
        {name:"PBKDF2"},false,["deriveKey"]
    );
    return crypto.subtle.deriveKey(
        {name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},
        keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]
    );
}
async function decrypt(){
    const pwd=document.getElementById("pwd");
    const dec=document.getElementById("decrypting");
    pwd.classList.remove("error");
    dec.style.display="block";
    try{
        const data=JSON.parse(atob(ENCRYPTED));
        const salt=b64(data.s);
        const iv=b64(data.i);
        const ct=b64(data.c);
        const tag=b64(data.t);
        const key=await deriveKey(pwd.value,salt);
        const combined=new Uint8Array(ct.length+tag.length);
        combined.set(ct);
        combined.set(tag,ct.length);
        const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,combined);
        document.open();
        document.write(new TextDecoder().decode(decrypted));
        document.close();
    }catch(e){
        pwd.classList.add("error");
        pwd.value="";
        dec.style.display="none";
    }
}
function b64(base64){
    const binary=atob(base64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    return bytes;
}
document.getElementById("pwd").addEventListener("keypress",function(e){
    if(e.key==="Enter")decrypt();
});
</script>
